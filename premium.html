<section class="premium-form">
  <div style="max-width: 420px; margin: 32px auto; background: #181818; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.2); padding: 32px; color: #fff; font-family: 'Helvetica Neue', Arial, sans-serif;">
    <h2 style="text-align: center; color: #ff4500; margin-bottom: 24px; font-size: 2rem; font-weight: 700; letter-spacing: 1px;">Get Premium</h2>
    <form>
      <div style="margin-bottom: 18px;">
        Name<br>
        <input type="text" id="name" name="name" placeholder="e.g. 
Neymar da Silva Santos Júnior" required style="width: 100%; padding: 10px; border-radius: 6px; border: none; margin-top: 6px; background: #282828; color: #fff;">
      </div>
      <div style="margin-bottom: 18px;">
        Address<br>
        <input type="text" id="address" name="address" placeholder="e.g. 123,street,city,state,country" required style="width: 100%; padding: 10px; border-radius: 6px; border: none; margin-top: 6px; background: #282828; color: #fff;">
      </div>
      <div style="margin-bottom: 18px;">
        Phone Number<br>
        <input type="tel" id="phone" name="phone" pattern="[0-9]{10}" placeholder="e.g. 91 7800****21" required style="width: 100%; padding: 10px; border-radius: 6px; border: none; margin-top: 6px; background: #282828; color: #fff;">
      </div>
      <div style="margin-bottom: 18px;">
        Email<br>
        <input type="email" id="email" name="email" placeholder="e.g. abc@gmail.com" required style="width: 100%; padding: 10px; border-radius: 6px; border: none; margin-top: 6px; background: #282828; color: #fff;">
      </div>
      <div style="margin-bottom: 24px;">
       Payment Method<br>
        <div style="display: flex; gap: 18px; margin-top: 8px;">
         
            <input type="radio" id="credit" name="payment" value="credit" required>
            <img src="D:/Manu Yadav -X-A/mastercard.png" alt="Credit Card" width="48" height="48" style="vertical-align: middle; background: #fff; border-radius: 6px;" />
                  
            <input type="radio" id="upi" name="payment" value="upi">
            <img src="D:/Manu Yadav -X-A/upi.png" alt="UPI" width="48" height="48" style="vertical-align: middle; background: #fff; border-radius: 6px;" />
          

            <input type="radio" id="paypal" name="payment" value="paypal">
            <img src="PayPal.png" alt="PayPal" width="48" height="48" style="vertical-align: middle; background: #fff; border-radius: 6px;" />
          
        </div>
      </div>
      <center> <button type="submit" style="width: 50%; background-color: #ff4500; color: #fff; padding: 12px 0; border: none; border-radius: 24px; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: background 0.2s;">Proceed to Pay</button></center>
    </form>
  </div>
</section>
